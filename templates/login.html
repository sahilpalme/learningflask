<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>
<body>
<div class="login-container">
<h2>Login</h2>

<form method="POST">

    {{ form.hidden_tag() }}
    <p>
    {{ form.username.label }}
    {{ form.username() }}</p>

    <br><br>
    <p>
    {{ form.password.label }}
    {{ form.password() }}</p>

    <br><br>
    <p>
    {{ form.submit() }}</p>

</form>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for msg in messages %}
            <p>{{ msg }}</p>
        {% endfor %}
    {% endif %}
{% endwith %}
</div>

</body>
</html>

{% extends "base.html" %}

{% block title %}Manage Doctors{% endblock %}

{% block content %}

<h1>Manage Doctors</h1>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>Action</th>
    </tr>

    {% for doctor in doctors %}

    <tr>
        <td>{{ doctor.id }}</td>
        <td>{{ doctor.username }}</td>
        <td>{{ doctor.email }}</td>
        <td>
    <a href="{{ url_for('main.delete_doctor', doctor_id=doctor.id) }}">
        Delete
    </a>
</td>
    </tr>

    {% endfor %}

</table>


{% endblock %}

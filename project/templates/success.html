<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Success</title>
</head>
<body style="color: red;" >

    {% with messages = get_flashed_messages() %}
        {%if messages %}
            {% for msg in messages %}
                <p>{{ msg }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <h2>Welcome: {{ current_user.username }} </h2>
    <p>Email : {{ current_user.email }}</p>
    <a href="{{ url_for('main.logout') }}" class="btn">
    logout
</a>
    
</body>
</html>
